# Load common config from ~/.config/tmux
source-file ~/.config/tmux/common.conf

# Mac-specific settings
# =====================

# アクティブなペインを目立たせる（common.confとは異なる配色）
set -g pane-active-border-style fg=colour255,bg=colour238

# コピーモード - 環境別クリップボード統合
# Why: clip.exe ではなく win32yank.exe。理由: clip.exeはCP932前提でUTF-8日本語が文字化けする
if-shell '[ "$PC" = "wsl" ]' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "win32yank.exe -i --crlf"; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "win32yank.exe -i --crlf"; \
     bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "win32yank.exe -i --crlf"' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"; \
     bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"'

# Prefix key: C-b → C-h に変更（Vim側 <C-h>h/j/k/l と統一）
# Why: send-prefix の明示バインドは不要（prefix を 2 回連打でネスト tmux に透過送信される tmux デフォルト挙動）
# Why: bind C-h last-window (common.conf) を上書きしないため send-prefix を削除
unbind C-b
set -g prefix C-h

# vim-tmux-navigator: tmux prefix (<C-h>) + hjkl で Vim/tmux 透過移動
# Why: is_vim 判定で Vim 動作中は <C-h>+key を Vim に送り、そうでなければ select-pane を実行
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind-key h if-shell "$is_vim" "send-keys C-h h" "select-pane -L"
bind-key j if-shell "$is_vim" "send-keys C-h j" "select-pane -D"
bind-key k if-shell "$is_vim" "send-keys C-h k" "select-pane -U"
bind-key l if-shell "$is_vim" "send-keys C-h l" "select-pane -R"

bind-key -T copy-mode-vi h select-pane -L
bind-key -T copy-mode-vi j select-pane -D
bind-key -T copy-mode-vi k select-pane -U
bind-key -T copy-mode-vi l select-pane -R
