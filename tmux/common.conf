# ==============================================================================
# tmux 共通設定
# 全環境で共有される基本設定
# ==============================================================================

# ------------------------------------------------------------------------------
# ターミナル設定
# ------------------------------------------------------------------------------
set -ga terminal-overrides 'xterm:colors=256'
set -as terminal-features ",gnome*:RGB"
set-option -sa terminal-overrides ",xterm*:Tc"

# ------------------------------------------------------------------------------
# デフォルトシェル設定
# ------------------------------------------------------------------------------
# WSL環境(PC=wsl)かつシェルが存在する場合のみNix版zshを使用
if-shell '[ "$PC" = "wsl" ] && [ -x /home/takets/.nix-profile/bin/zsh ]' \
    'set-option -g default-shell /home/takets/.nix-profile/bin/zsh'

# ------------------------------------------------------------------------------
# Prefix キー設定
# ------------------------------------------------------------------------------
set -ga prefix ^h
unbind C-b

# ------------------------------------------------------------------------------
# 基本設定
# ------------------------------------------------------------------------------
# ステータスバーを10秒毎に描画し直す（CPU負荷軽減のため1→10に変更）
set-option -g status-interval 10

# マウス操作を有効にする
set-option -g mouse on

# ウィンドウ/ペイン番号を1から開始
set-option -g base-index 1
setw -g pane-base-index 1

# ESCキーの反応を短くする
set -s escape-time 0

# vim/neovim との連携のためにフォーカスイベントを有効化
set -g focus-events on

# ------------------------------------------------------------------------------
# キーバインド - ペイン操作
# ------------------------------------------------------------------------------
# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 直前のウィンドウに切り替え
bind C-h last-window

# ------------------------------------------------------------------------------
# ペインボーダー設定（デフォルト）
# ------------------------------------------------------------------------------
set -g pane-border-style fg=green,bg=default
set -g pane-active-border-style fg=white,bg=default

# ------------------------------------------------------------------------------
# ペイン背景色設定（アクティブ・非アクティブ統一）
# ------------------------------------------------------------------------------
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# ペイン上部にClaude Codeステータスを表示
set -g pane-border-status top
set -g pane-border-format "#[fg=colour255] #{ai_agent_status} #[default]"

# ------------------------------------------------------------------------------
# ステータスバー設定
# ------------------------------------------------------------------------------
set -g status-style bg=default
set -g status-left-length 90
set -g status-right-length 90
set -g status-justify absolute-centre

# ステータスバーの背景色・文字色
set-option -g status-bg "colour238"
set-option -g status-fg "colour255"

# status-left フォーマット
set-option -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default]"

# status-right フォーマット
set -g status-right "#[fg=colour255,bg=colour241] %Y%b-%d %l:%M"

# window-status フォーマット（絵文字付き）
setenv -g FGC colour4
set -g window-status-current-format "#[fg=#{FGC}]#[fg=colour7,bg=#{FGC}]\[👉#I:#W#{ai_agent_window_status}\]#[fg=#{FGC},bg=default]"
set -g window-status-format "#[fg=colour244]#[fg=default,bg=colour244]\[#I:#W#{ai_agent_window_status}\]#[fg=colour244,bg=default]"

# ------------------------------------------------------------------------------
# ビジュアル通知
# ------------------------------------------------------------------------------
setw -g monitor-activity on
set -g visual-activity on

# ------------------------------------------------------------------------------
# コピーモード（vi スタイル）
# ------------------------------------------------------------------------------
set-window-option -g mode-keys vi
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ==============================================================================
# プラグイン管理（共通設定）
# ==============================================================================

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'

# Text Object プラグイン
# set -g @plugin 'nekowasabi/tmux-text-object'
run-shell ~/repos/tmux-text-object/text_object.tmux

# Claude Code Status プラグイン設定
set -g @ai_agent_left_sep "["
set -g @ai_agent_right_sep "]"
set -g @ai_agent_working_color "#f97316"
set -g @ai_agent_idle_color "#22c55e"
set -g @ai_agent_working_threshold "10"
set -g @ai_agent_select_key "C-j"
set -g @ai_agent_fzf_preview_position "bottom"
set -g @ai_agent_fzf_preview_size "75%"

# カラフル絵文字でステータス表示
set -g @ai_agent_running_dot "🟢"
set -g @ai_agent_waiting_dot "🟡"
set -g @ai_agent_idle_dot_new "⚪"
set -g @ai_agent_unknown_dot "❓"


# Claude Code Status プラグイン読み込み
# set -g @plugin 'nekowasabi/tmux-claudecode-status'
run '~/repos/tmux-ai-agents-status/ai_agent_status.tmux'

# set -g @plugin 'Morantron/tmux-fingers'
# set -g @fingers-hint-style 'fg=red'

run "~/repos/tmux-hint/tmux-hint.tmux"

bind-key -T copy-mode-vi s run-shell -b 'tmux-fuzzy-motion start #{pane_id} #{client_tty}'
bind-key -T copy-mode s run-shell -b 'tmux-fuzzy-motion start #{pane_id} #{client_tty}'

# Initialize TMUX plugin manager (keep this line at the very bottom of common.conf)
run '~/.tmux/plugins/tpm/tpm'
